<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Badminton Shop</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <!-- CSS Custom (Tông Xanh - Trắng) -->
    <style>
        body { background-color: #f8f9fa; }
        .text-sport { color: #0d6efd; font-weight: bold; }
        .bg-sport { background-color: #0d6efd; color: white; }
        .btn-sport { background-color: #0d6efd; color: white; border: none; }
        .btn-sport:hover { background-color: #0b5ed7; color: white; }
        .card-product { transition: transform 0.2s, box-shadow 0.2s; border: none; }
        .card-product:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<!-- NAVBAR DÙNG CHUNG -->
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-sport shadow-sm sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}"><i class="bi bi-vinyl-fill"></i> SMASH SHOP</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link text-white" th:href="@{/}">Trang chủ</a>
                </li>
            </ul>
            <ul class="navbar-nav">
                <!-- Nút Giỏ Hàng hiển thị số lượng từ GlobalControllerAdvice -->
                <li class="nav-item me-3">
                    <a class="btn btn-light text-primary fw-bold position-relative" th:href="@{/cart}">
                        <i class="bi bi-cart-fill"></i> Giỏ hàng
                        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                              th:text="${cartCount}">0</span>
                    </a>
                </li>

                <!-- Chưa đăng nhập -->
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="nav-link text-white" th:href="@{/login}">Đăng nhập</a>
                </li>
                <!-- Đã đăng nhập -->
                <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                    <a class="nav-link dropdown-toggle text-white fw-bold" href="#" data-bs-toggle="dropdown">
                        <i class="bi bi-person-circle"></i> <span sec:authentication="name">User</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" th:href="@{/orders}"><i class="bi bi-clock-history"></i> Lịch sử đơn hàng</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <form th:action="@{/logout}" method="post">
                                <button type="submit" class="dropdown-item text-danger"><i class="bi bi-box-arrow-right"></i> Đăng xuất</button>
                            </form>
                        </li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- FOOTER DÙNG CHUNG -->
<footer th:fragment="footer" class="bg-dark text-white text-center py-4 mt-5">
    <div class="container">
        <p class="mb-0">&copy; 2026 Smash Badminton Shop. Nâng tầm đam mê cầu lông của bạn.</p>
    </div>
    <!-- Cần load file JS của Bootstrap để Navbar hoạt động -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</footer>

</body>
</html>
