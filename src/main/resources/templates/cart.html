<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Giỏ hàng của bạn')}"></head>
<body>
<div th:replace="~{fragments :: navbar}"></div>

<div class="container mt-5 min-vh-100">
    <h2 class="text-sport fw-bold mb-4"><i class="bi bi-cart3"></i> Giỏ Hàng Của Bạn</h2>

    <div th:if="${cartItems.empty}" class="alert alert-info text-center shadow-sm">
        <h4>Giỏ hàng đang trống!</h4>
        <p>Hãy nhanh tay chọn cho mình những món đồ cầu lông ưng ý nhé.</p>
        <a th:href="@{/}" class="btn btn-sport mt-2">Tiếp tục mua sắm</a>
    </div>

    <div th:if="${!cartItems.empty}" class="card shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>Sản phẩm</th>
                        <th>Đơn giá</th>
                        <th style="width: 150px;">Số lượng</th>
                        <th>Thành tiền</th>
                        <th class="text-center">Thao tác</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="item : ${cartItems}">
                        <td>
                            <div class="d-flex align-items-center">
                                <img th:src="${item.imageUrl != null ? item.imageUrl : 'https://via.placeholder.com/50'}" width="50" height="50" class="rounded me-3">
                                <span class="fw-bold" th:text="${item.productName}"></span>
                            </div>
                        </td>
                        <td class="text-danger" th:text="${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>

                        <!-- Form cập nhật số lượng -->
                        <td>
                            <form th:action="@{/cart/update}" method="post" class="d-flex">
                                <input type="hidden" name="productId" th:value="${item.productId}">
                                <input type="number" name="quantity" th:value="${item.quantity}" min="1" class="form-control form-control-sm text-center me-1">
                                <button type="submit" class="btn btn-sm btn-outline-primary"><i class="bi bi-arrow-clockwise"></i></button>
                            </form>
                        </td>

                        <td class="text-danger fw-bold" th:text="${#numbers.formatDecimal(item.subTotal, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                        <td class="text-center">
                            <a th:href="@{'/cart/remove/' + ${item.productId}}" class="btn btn-sm btn-danger"><i class="bi bi-trash"></i> Xóa</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="card-footer bg-white d-flex justify-content-between align-items-center p-4">
            <a th:href="@{/cart/clear}" class="btn btn-outline-danger" onclick="return confirm('Bạn có chắc muốn xóa toàn bộ giỏ hàng?');">Xóa sạch</a>
            <div class="text-end">
                <h4 class="mb-3">Tổng tiền: <span class="text-danger fw-bold" th:text="${#numbers.formatDecimal(totalAmount, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span></h4>
                <a th:href="@{/checkout}" class="btn btn-sport btn-lg px-5">Tiến Hành Thanh Toán</a>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
