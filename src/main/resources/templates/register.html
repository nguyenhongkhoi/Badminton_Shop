<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Đăng ký - Smash Shop')}"></head>
<body>
<div th:replace="~{fragments :: navbar}"></div>

<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-0">
                <div class="card-header bg-sport text-white text-center py-3">
                    <h4 class="mb-0"><i class="bi bi-person-plus-fill"></i> Đăng Ký Tài Khoản</h4>
                </div>
                <div class="card-body p-4">
                    <!-- Hiện lỗi nếu trùng email hoặc username -->
                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                    <form th:action="@{/register}" th:object="${user}" method="post">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Tên đăng nhập <span class="text-danger">*</span></label>
                                <input type="text" th:field="*{username}" class="form-control" required placeholder="VD: jondoe123">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Mật khẩu <span class="text-danger">*</span></label>
                                <input type="password" th:field="*{password}" class="form-control" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Email <span class="text-danger">*</span></label>
                            <input type="email" th:field="*{email}" class="form-control" required placeholder="example@gmail.com">
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Họ và Tên</label>
                            <input type="text" th:field="*{fullName}" class="form-control" placeholder="Nhập tên đầy đủ...">
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Địa chỉ giao hàng mặc định</label>
                            <textarea th:field="*{address}" class="form-control" rows="2" placeholder="Nhập địa chỉ của bạn..."></textarea>
                        </div>

                        <button type="submit" class="btn btn-sport btn-lg w-100 fw-bold shadow-sm">Tạo Tài Khoản</button>
                    </form>

                    <div class="text-center mt-4">
                        Đã có tài khoản? <a th:href="@{/login}" class="text-decoration-none text-sport fw-bold">Đăng nhập</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
