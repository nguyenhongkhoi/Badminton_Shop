<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Lịch sử đơn hàng - Smash Shop')}"></head>
<body>
<div th:replace="~{fragments :: navbar}"></div>

<div class="container mt-5 min-vh-100">
    <h2 class="text-sport fw-bold mb-4"><i class="bi bi-clock-history"></i> Lịch Sử Đơn Hàng</h2>

    <!-- Bắt tham số success khi vừa thanh toán xong -->
    <div th:if="${param.success}" class="alert alert-success shadow-sm text-center fw-bold fs-5">
        <i class="bi bi-check-circle-fill"></i> Đặt hàng thành công! Cảm ơn bạn đã mua sắm tại Smash Shop.
    </div>

    <!-- Nếu không có đơn hàng -->
    <div th:if="${orders.empty}" class="alert alert-info text-center shadow-sm py-5">
        <h4>Bạn chưa có đơn hàng nào!</h4>
        <p>Hãy dạo quanh shop và tìm cho mình một cây vợt ưng ý nhé.</p>
        <a th:href="@{/}" class="btn btn-sport mt-2">Đi tới cửa hàng</a>
    </div>

    <!-- Danh sách đơn hàng -->
    <div th:if="${!orders.empty}">
        <div class="card shadow-sm mb-4 border-0" th:each="order : ${orders}">
            <!-- Header đơn hàng -->
            <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
                <span class="fw-bold text-secondary">
                    Mã đơn: <span class="text-dark">#SMASH-<span th:text="${order.id}"></span></span>
                </span>
                <!-- Badge trạng thái -->
                <span class="badge rounded-pill fs-6 px-3"
                      th:classappend="${order.status == 'PENDING' ? 'bg-warning text-dark' : (order.status == 'COMPLETED' ? 'bg-success' : 'bg-secondary')}"
                      th:text="${order.status}">PENDING</span>
            </div>

            <div class="card-body">
                <div class="row mb-3">
                    <div class="col-md-6">
                        <p class="mb-1"><i class="bi bi-calendar-event text-primary"></i> <strong>Ngày đặt:</strong>
                            <span th:text="${#temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm')}"></span>
                        </p>
                    </div>
                    <div class="col-md-6 text-md-end">
                        <p class="mb-1"><i class="bi bi-geo-alt-fill text-danger"></i> <strong>Giao đến:</strong>
                            <span th:text="${order.shippingAddress}"></span>
                        </p>
                    </div>
                </div>

                <!-- Chi tiết sản phẩm trong đơn -->
                <div class="table-responsive">
                    <table class="table table-bordered mb-0 text-center align-middle">
                        <thead class="table-light">
                        <tr>
                            <th>Sản phẩm</th>
                            <th>Đơn giá</th>
                            <th>Số lượng</th>
                            <th>Thành tiền</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="detail : ${order.orderDetails}">
                            <td class="text-start fw-bold text-secondary" th:text="${detail.product.name}"></td>
                            <td th:text="${#numbers.formatDecimal(detail.price, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                            <td th:text="${detail.quantity}"></td>
                            <td class="fw-bold text-danger" th:text="${#numbers.formatDecimal(detail.price * detail.quantity, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="card-footer bg-light text-end py-3">
                <h4 class="mb-0">Tổng thanh toán: <span class="text-danger fw-bold" th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span></h4>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
