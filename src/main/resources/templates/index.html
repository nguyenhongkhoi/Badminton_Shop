<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Trang chủ - Smash Shop')}"></head>
<body>
<div th:replace="~{fragments :: navbar}"></div>

<div class="container mt-4">
    <div class="row">
        <!-- Cột trái: Bộ lọc -->
        <div class="col-md-3">
            <div class="card mb-4 shadow-sm">
                <div class="card-header bg-sport fw-bold"><i class="bi bi-tags"></i> Danh Mục</div>
                <ul class="list-group list-group-flush">
                    <a th:href="@{/}" class="list-group-item list-group-item-action text-primary">Tất cả sản phẩm</a>
                    <a th:each="cat : ${categories}" th:href="@{/(categoryId=${cat.id})}"
                       th:text="${cat.name}" class="list-group-item list-group-item-action"></a>
                </ul>
            </div>

            <div class="card shadow-sm">
                <div class="card-header bg-sport fw-bold"><i class="bi bi-shield-check"></i> Thương Hiệu</div>
                <ul class="list-group list-group-flush">
                    <a th:each="brand : ${brands}" th:href="@{/(brandId=${brand.id})}"
                       th:text="${brand.name}" class="list-group-item list-group-item-action"></a>
                </ul>
            </div>
        </div>

        <!-- Cột phải: Danh sách sản phẩm -->
        <div class="col-md-9">
            <h2 class="text-sport mb-4">Sản Phẩm Nổi Bật</h2>
            <div class="row row-cols-1 row-cols-md-3 g-4">
                <div class="col" th:each="product : ${products}">
                    <div class="card h-100 card-product">
                        <!-- Hiển thị ảnh (nếu URL rỗng thì dùng ảnh mặc định) -->
                        <img th:src="${product.imageUrl != null ? product.imageUrl : 'https://via.placeholder.com/300x300?text=No+Image'}"
                             class="card-img-top" alt="Product Image" style="object-fit: cover; height: 250px;">

                        <div class="card-body d-flex flex-column">
                            <h5 class="card-title text-truncate" th:text="${product.name}">Tên vợt</h5>
                            <!-- Format tiền tệ Việt Nam (Thêm dấu chấm) -->
                            <p class="card-text text-danger fw-bold fs-5 mb-1"
                               th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' đ'"></p>

                            <p class="text-muted small mb-3">
                                Hãng: <span th:text="${product.brand.name}">Brand</span> |
                                Kho: <span th:text="${product.stock}">10</span>
                            </p>

                            <!-- Nút Xem chi tiết -->
                            <div class="mt-auto">
                                <a th:href="@{'/product/' + ${product.id}}" class="btn btn-outline-primary w-100 mb-2">Xem chi tiết</a>

                                <!-- Form thêm trực tiếp vào giỏ -->
                                <form th:action="@{/cart/add}" method="post">
                                    <input type="hidden" name="productId" th:value="${product.id}">
                                    <input type="hidden" name="quantity" value="1">
                                    <button type="submit" class="btn btn-sport w-100" th:disabled="${product.stock == 0}">
                                        <i class="bi bi-cart-plus"></i> <span th:text="${product.stock > 0 ? 'Thêm vào giỏ' : 'Hết hàng'}"></span>
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Thông báo nếu không có sản phẩm -->
            <div th:if="${products.empty}" class="alert alert-warning mt-3 text-center">
                Không tìm thấy sản phẩm nào phù hợp!
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
