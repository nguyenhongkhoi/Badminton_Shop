spring.application.name=BadmintonShop
# Server Port
server.port=8080

# Database Connection (SQL Server)
# ??i c?ng 1433 vŕ tęn database t??ng ?ng
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=badminton_shop_db;encrypt=true;trustServerCertificate=true;
